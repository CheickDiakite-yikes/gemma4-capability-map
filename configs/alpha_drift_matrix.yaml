matrix:
  name: alpha_drift_probe
  description: >
    Targeted factorized stressor probe on the now-stable local benchmark lanes.
    Uses MLX E2B as the default reasoner backend and generated single-axis variants.
  experiments:
    - id: mlx_e2b_monolith_thinking_variants
      pipeline: monolith
      track: thinking
      backend: mlx
      reasoner_backend: mlx
      reasoner: google/gemma-4-E2B-it
      reasoner_device: mps
      max_new_tokens: 48
      thinking: false
      variants: true
      task_ids:
        - think_003_policy_reasoning
        - think_006_screenshot_security
        - think_007_doc_image_summary
        - think_011_incident_screenshot_toggle
        - think_012_billing_invoice_lock
      notes:
        - Factorized thinking drift probe across language, context, and image-grounding tasks.
        - Includes multiple screenshot surfaces so multilingual multimodal regressions are not tied to a single asset.
    - id: mlx_e2b_monolith_tool_routing_variants
      pipeline: monolith
      track: tool_routing
      backend: mlx
      reasoner_backend: mlx
      reasoner: google/gemma-4-E2B-it
      reasoner_device: mps
      max_new_tokens: 48
      thinking: false
      variants: true
      task_ids:
        - tool_001_calendar_search
        - tool_010_validator_ready
      notes:
        - Focuses on schema drift, context drift, and code-switched routing prompts.
    - id: mlx_e2b_hybrid_retrieval_variants
      pipeline: hybrid
      track: retrieval
      backend: mlx
      reasoner_backend: mlx
      retriever_backend: heuristic
      reasoner: google/gemma-4-E2B-it
      retriever: google/embeddinggemma-300m
      reasoner_device: mps
      max_new_tokens: 48
      thinking: false
      variants: true
      task_ids:
        - retr_003_incident_multimodal
        - retr_010_rollout_mode
      notes:
        - Covers multilingual, long-history, and reduced-budget retrieval perturbations.
    - id: mlx_e2b_modular_full_stack_variants
      pipeline: modular
      track: full_stack
      backend: mlx
      reasoner_backend: mlx
      router_backend: heuristic
      retriever_backend: heuristic
      reasoner: google/gemma-4-E2B-it
      router: google/functiongemma-270m-it
      retriever: google/embeddinggemma-300m
      reasoner_device: mps
      max_new_tokens: 48
      planning_max_new_tokens: 48
      final_max_new_tokens: 96
      thinking: false
      variants: true
      task_ids:
        - agent_002_reschedule_sarah
        - agent_010_parallel_audit_patch
      notes:
        - Exercises full-stack validator, changed-constraint, and compact-context variants.
